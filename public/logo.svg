<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Shield gradient: indigo-700 → indigo-950 -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- Cylinder gradient: indigo-400 → indigo-600 -->
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ── Shield body ─────────────────────────────────────────── -->
  <path
    d="M100 12
       L175 44
       L175 104
       C175 150 100 188 100 188
       C100 188 25 150 25 104
       L25 44 Z"
    fill="url(#shieldGrad)"
    filter="url(#shadow)"
  />

  <!-- Shield inner border highlight -->
  <path
    d="M100 22
       L165 50
       L165 104
       C165 144 100 178 100 178
       C100 178 35 144 35 104
       L35 50 Z"
    fill="none"
    stroke="#6366f1"
    stroke-width="1.5"
    opacity="0.4"
  />

  <!-- ── Database cylinder ──────────────────────────────────── -->
  <!-- Top cap (ellipse) -->
  <ellipse cx="100" cy="76" rx="38" ry="13"
    fill="#a5b4fc" opacity="0.95"/>

  <!-- Cylinder body -->
  <rect x="62" y="76" width="76" height="52"
    fill="url(#cylGrad)"/>

  <!-- Data row lines -->
  <ellipse cx="100" cy="93" rx="38" ry="13"
    fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="100" cy="110" rx="38" ry="13"
    fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.45"/>

  <!-- Bottom cap (ellipse) -->
  <ellipse cx="100" cy="128" rx="38" ry="13"
    fill="#4338ca"/>

  <!-- Shine on top cap -->
  <ellipse cx="92" cy="73" rx="18" ry="5"
    fill="white" opacity="0.12"/>

  <!-- ── Lock icon (security badge) ────────────────────────── -->
  <!-- Lock body -->
  <rect x="87" y="140" width="26" height="20" rx="4"
    fill="#e0e7ff" opacity="0.95"/>
  <!-- Lock shackle -->
  <path
    d="M93 140 L93 133 A7 7 0 0 1 107 133 L107 140"
    fill="none"
    stroke="#e0e7ff"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.95"
  />
  <!-- Keyhole -->
  <circle cx="100" cy="149" r="3.5" fill="#4338ca"/>
  <rect x="98.5" y="150" width="3" height="5" rx="1" fill="#4338ca"/>
</svg>
